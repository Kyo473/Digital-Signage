server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500m;
    }

    location /uploads/ {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
